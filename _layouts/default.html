<!DOCTYPE html>
<html lang="{{ site.lang | default: 'fr-FR' }}">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#155799">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    {% include head-custom.html %}
  </head>
  <body>
    <a id="skip-to-content" href="#content">Aller au contenu.</a>

    <header class="page-header" role="banner">
      <h1 class="project-name" aria-label="RIVE">
        <svg class="project-logo" viewBox="0 0 320 80" role="img" aria-hidden="true" focusable="false">
          <text x="0" y="58"
                font-family="'Open Sans','Helvetica Neue',Arial,sans-serif"
                font-weight="700" font-size="62" letter-spacing="2"
                fill="currentColor">RIVE</text>
          <line x1="4" y1="72" x2="172" y2="72"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
          <g fill="currentColor" opacity="0.85">
            <circle cx="186" cy="72" r="2.2"/>
            <circle cx="202" cy="72" r="2.2"/>
            <circle cx="218" cy="72" r="2.2"/>
            <circle cx="234" cy="72" r="2.2"/>
            <circle cx="250" cy="72" r="2.2"/>
            <circle cx="266" cy="72" r="2.2"/>
            <circle cx="282" cy="72" r="2.2"/>
            <circle cx="298" cy="72" r="2.2"/>
          </g>
        </svg>
      </h1>
      <h2 class="project-tagline">{{ page.description | default: site.description | default: site.github.project_tagline }}</h2>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}

      <footer class="site-footer">
        <span class="site-footer-credits">Document d’instruction politique. Auteur : Sylvain Geffroy.</span>
      </footer>
    </main>
  </body>
</html>
